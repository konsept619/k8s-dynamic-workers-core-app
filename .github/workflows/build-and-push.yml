name: Build and Push to Local Registry

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'Containerfile'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: k3s-runner-set
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    
    env:
      REGISTRY: ${{ secrets.LOCAL_REGISTRY_URL }}
      IMAGE_NAME: "etl-dynamic-workers-app"
      TAG: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Check SHA
          run: echo "Generated tag: ${{ steps.vars.outputs.short_sha }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: kubernetes
          install: true 
          buildkitd-config-inline: |
            [registry."${{ secrets.LOCAL_REGISTRY_URL }}"]
              http = true
              insecure = true

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    needs: build-and-push
    runs-on: k3s-runner-set
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: 'konsept619/k8s-dynamic-workers-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo
          ref: master

      - name: Update Helm Tag in values.yaml via sed
        run: |
          cd gitops-repo
          sed -i 's/^\([[:space:]]*tag:\).*/\1 "${{ needs.build-and-push.outputs.short_sha }}"/' Helm-Chart/values.yaml

      - name: Commit and Push changes
        run: |
          cd gitops-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Helm-Chart/values.yaml
          git commit -m "Deploy: Nowy tag obrazu ${{ needs.build-and-push.outputs.short_sha }} [skip ci]"
          git push origin main
