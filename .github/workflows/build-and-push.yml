name: Build and Push to Local Registry

on:
  push:
    branches:
      - main 
    paths:
      - 'src/**'
      - 'Containerfile'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: k3s-runner-set
    
    env:
      REGISTRY: ${{ secrets.LOCAL_REGISTRY_URL }}
      IMAGE_NAME: "etl-dynamic-workers-app"
      TAG: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: kubernetes
          bootstrap: true

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
